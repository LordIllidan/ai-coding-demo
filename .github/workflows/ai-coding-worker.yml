name: AI Coding Worker

on:
  repository_dispatch:
    types:
      - ai_coding_task
  workflow_dispatch:
    inputs:
      jira_key:
        description: Source Jira issue key (e.g. AISDLC-12)
        required: true
      title:
        description: Task title
        required: true
      body:
        description: Task description
        required: true

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-coding-worker-${{ github.event.client_payload.jira_key || github.event.inputs.jira_key }}
  cancel-in-progress: false

jobs:
  coding:
    name: Run local Claude Code worker
    runs-on:
      - self-hosted
      - Windows
      - X64
      - ai-demo-worker

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          claude --version

      - name: Run local Claude Code worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_CLAUDE_MODEL: ${{ vars.AI_CLAUDE_MODEL || 'sonnet' }}
          AI_CLAUDE_MAX_BUDGET_USD: ${{ vars.AI_CLAUDE_MAX_BUDGET_USD || '2' }}
          TASK_TITLE: ${{ github.event.client_payload.title || github.event.inputs.title }}
          TASK_BODY: ${{ github.event.client_payload.body || github.event.inputs.body }}
        run: |
          .\.github\scripts\ai-coding-worker.ps1 `
            -JiraKey "${{ github.event.client_payload.jira_key || github.event.inputs.jira_key }}" `
            -Repository "${{ github.repository }}" `
            -BaseBranch "${{ github.event.repository.default_branch }}" `
            -RunId "${{ github.run_id }}"
