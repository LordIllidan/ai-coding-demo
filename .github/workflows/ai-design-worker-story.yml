name: AI Design Worker (Story, pre-dev)

on:
  repository_dispatch:
    types:
      - ai_design_review_task

permissions:
  contents: read

concurrency:
  group: ai-design-worker-story-${{ github.event.client_payload.story_key }}
  cancel-in-progress: false

jobs:
  design-review:
    name: Run local Claude Code design/UX contract review
    runs-on:
      - self-hosted
      - Windows
      - X64
      - ai-demo-worker

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4

      - name: Verify local tools
        shell: pwsh
        run: |
          claude --version

      - name: Run local Claude Code design/UX contract review
        shell: pwsh
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          AI_CLAUDE_MODEL: ${{ vars.AI_CLAUDE_MODEL || 'sonnet' }}
          AI_CLAUDE_DESIGN_BUDGET_USD: ${{ vars.AI_CLAUDE_DESIGN_BUDGET_USD || '1' }}
          # Kontrakt przez env, nie CLI arg -- dowolny tekst z Jiry moze zawierac cudzyslowy
          # ktore psuja parsowanie PowerShella gdy interpolowane wprost w "run:".
          CONTRACT_TEXT: ${{ github.event.client_payload.contract }}
        run: |
          .\.github\scripts\ai-design-worker-story.ps1 `
            -StoryKey "${{ github.event.client_payload.story_key }}" `
            -StoryStatus "${{ github.event.client_payload.story_status }}" `
            -RunId "${{ github.run_id }}"
