name: AI Review Worker

# SUPERSEDED przez ai-review-worker-story.yml (story-level, dispatchowany przez bridge) —
# label "ai-review-task" nie jest juz nigdzie automatycznie dodawany, wiec ten workflow
# juz sam z siebie nie odpala. Zostawiony jako reczny fallback (workflow_dispatch) do
# recenzji pojedynczego PR-a poza normalnym flow.
#
# `pull_request: labeled` trigger USUNIETY celowo (byl tu wczesniej) — skoro job i tak
# zawsze sie skip'owal (label nigdy nie jest dodawany), workflow i tak fiirowal na KAZDY
# label add na KAZDYM PR (GitHub nie filtruje po nazwie labela na poziomie triggera, tylko
# job "if:"), co generowalo czysty szum w historii Actions bez zadnej realnej pracy —
# user zglosil live "duzo duplikatow na CI/CD". Zostaje TYLKO workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ai-review-worker-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: false

jobs:
  review:
    name: Run local Claude Code review worker
    runs-on:
      - self-hosted
      - Windows
      - X64
      - ai-demo-worker

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify local tools
        shell: pwsh
        run: |
          git --version
          gh --version
          claude --version

      - name: Run local Claude Code review worker
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_CLAUDE_MODEL: ${{ vars.AI_CLAUDE_MODEL || 'sonnet' }}
          AI_CLAUDE_REVIEW_BUDGET_USD: ${{ vars.AI_CLAUDE_REVIEW_BUDGET_USD || '1' }}
        run: |
          .\.github\scripts\ai-review-worker.ps1 `
            -PullRequestNumber ${{ github.event.pull_request.number || github.event.inputs.pr_number }} `
            -Repository "${{ github.repository }}" `
            -RunId "${{ github.run_id }}"
