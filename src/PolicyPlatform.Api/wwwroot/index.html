<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PolicyPlatform</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  section { border: 1px solid #8884; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  label { display: block; margin-top: 0.5rem; font-size: 0.9rem; }
  input, select { width: 100%; padding: 0.4rem; margin-top: 0.2rem; box-sizing: border-box; }
  button { margin-top: 0.8rem; padding: 0.5rem 1rem; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
  th, td { text-align: left; padding: 0.4rem; border-bottom: 1px solid #8884; font-size: 0.9rem; }
  .status-Draft { color: #b8860b; }
  .status-Active { color: #2e8b57; }
  .status-Cancelled, .status-Expired { color: #a33; }
  #log { white-space: pre-wrap; font-family: monospace; font-size: 0.8rem; color: #888; }
  .field-error { color: #a33; font-size: 0.8rem; margin-top: 0.2rem; min-height: 1em; }
  input.invalid { border-color: #a33; outline-color: #a33; }
  .badge { display: inline-flex; align-items: center; justify-content: center; min-width: 1.4rem; height: 1.4rem;
    padding: 0 0.35rem; border-radius: 999px; background: #a33; color: #fff; font-size: 0.85rem; font-weight: 600; }
  .notif-item { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0; border-bottom: 1px solid #8884; }
</style>
</head>
<body>
<h1>PolicyPlatform — demo</h1>

<section>
  <h2>1. Nowy klient</h2>
  <label>Imię i nazwisko <input id="custName" value="Jan Kowalski" /></label>
  <label>Email <input id="custEmail" value="jan.kowalski@example.com" /></label>
  <button onclick="createCustomer()">Utwórz klienta</button>
  <div id="custResult"></div>
</section>

<section>
  <h2>2. Nowa polisa (draft)</h2>
  <label>Customer ID <input id="policyCustomerId" placeholder="wklej z kroku 1" /></label>
  <label>Data początku <input id="effectiveDate" type="date" /></label>
  <label>Data końca <input id="expiryDate" type="date" /></label>
  <label>Coverage
    <select id="coverageType">
      <option value="OC">OC (obowiązkowe)</option>
      <option value="AC">AC</option>
      <option value="NNW">NNW</option>
    </select>
  </label>
  <label>Suma ubezpieczenia <input id="sumInsured" type="number" value="50000" /></label>
  <label>Składka <input id="premium" type="number" value="800" /></label>
  <button onclick="createPolicy()">Utwórz polisę</button>
  <div id="policyResult"></div>
</section>

<section>
  <h2>3. Polisy</h2>
  <button onclick="loadPolicies()">Odśwież</button>
  <table>
    <thead><tr><th>Numer</th><th>Status</th><th>Składka</th><th>Akcje</th></tr></thead>
    <tbody id="policiesBody"></tbody>
  </table>
</section>

<section>
  <h2>4. Zgłoszenie kradzieży</h2>
  <label>Customer ID <input id="theftCustomerId" placeholder="wklej z kroku 1" /></label>
  <label>Data kradzieży <input id="theftIncidentDate" type="date" /></label>
  <div id="theftIncidentDateError" class="field-error"></div>
  <label>Opis zdarzenia <input id="theftDescription" placeholder="okoliczności kradzieży" /></label>
  <label>Numer zgłoszenia Policji * <input id="theftPoliceReportNumber" placeholder="np. L.dz. 123/26/RSD" required /></label>
  <div id="theftPoliceReportNumberError" class="field-error"></div>
  <button onclick="submitTheftClaim()">Zgłoś kradzież</button>
  <div id="theftResult"></div>
</section>

<section>
  <h2>5. Powiadomienia (ekran mobilny)</h2>
  <p>Nieprzeczytane: <span id="notifBadge" class="badge">0</span></p>
  <button onclick="onScreenEnter()">Wejście na ekran (odśwież)</button>
  <button onclick="onPushReceived()">Symuluj push</button>
  <div id="notifCounterResult"></div>
  <div id="notifList"></div>
</section>

<div id="log"></div>

<script src="theft-claim-validation.js"></script>
<script src="notification-counter.js"></script>
<script>
const log = (msg) => { document.getElementById('log').textContent += msg + "\n"; };

async function api(path, options) {
  const res = await fetch(path, options);
  const text = await res.text();
  const body = text ? JSON.parse(text) : null;
  if (!res.ok) {
    log(`ERROR ${path}: ${res.status} ${JSON.stringify(body)}`);
    throw new Error(body?.detail || body?.title || res.statusText);
  }
  return body;
}

async function createCustomer() {
  const fullName = document.getElementById('custName').value;
  const email = document.getElementById('custEmail').value;
  try {
    const customer = await api('/api/customers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fullName, email }),
    });
    document.getElementById('custResult').textContent = `Utworzono: ${customer.id}`;
    document.getElementById('policyCustomerId').value = customer.id;
  } catch (e) { document.getElementById('custResult').textContent = `Błąd: ${e.message}`; }
}

async function createPolicy() {
  const customerId = document.getElementById('policyCustomerId').value;
  const effectiveDate = document.getElementById('effectiveDate').value;
  const expiryDate = document.getElementById('expiryDate').value;
  const type = document.getElementById('coverageType').value;
  const sumInsured = Number(document.getElementById('sumInsured').value);
  const premium = Number(document.getElementById('premium').value);
  try {
    const policy = await api('/api/policies', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        customerId, effectiveDate, expiryDate,
        coverages: [{ type, sumInsured, premium, currency: 'PLN' }],
      }),
    });
    document.getElementById('policyResult').textContent = `Utworzono: ${policy.number} (${policy.status})`;
    loadPolicies();
  } catch (e) { document.getElementById('policyResult').textContent = `Błąd: ${e.message}`; }
}

async function activatePolicy(id) {
  try { await api(`/api/policies/${id}/activate`, { method: 'POST' }); loadPolicies(); }
  catch (e) { log(`Aktywacja nieudana: ${e.message}`); }
}

async function loadPolicies() {
  const policies = await api('/api/policies');
  const body = document.getElementById('policiesBody');
  body.innerHTML = '';
  for (const p of policies) {
    const row = document.createElement('tr');
    const canActivate = p.status === 'Draft';
    row.innerHTML = `
      <td>${p.number}</td>
      <td class="status-${p.status}">${p.status}</td>
      <td>${p.totalPremium.toFixed(2)} ${p.currency}</td>
      <td>${canActivate ? `<button onclick="activatePolicy('${p.id}')">Aktywuj</button>` : ''}</td>`;
    body.appendChild(row);
  }
}

function submitTheftClaim() {
  const policeReportNumber = document.getElementById('theftPoliceReportNumber').value;
  const incidentDate = document.getElementById('theftIncidentDate').value;
  const policeInput = document.getElementById('theftPoliceReportNumber');
  const dateInput = document.getElementById('theftIncidentDate');
  const policeErrorEl = document.getElementById('theftPoliceReportNumberError');
  const dateErrorEl = document.getElementById('theftIncidentDateError');
  const resultEl = document.getElementById('theftResult');

  const { valid, errors } = TheftClaimValidation.validateTheftClaimForm({ policeReportNumber, incidentDate });

  policeErrorEl.textContent = errors.policeReportNumber || '';
  policeInput.classList.toggle('invalid', Boolean(errors.policeReportNumber));
  dateErrorEl.textContent = errors.incidentDate || '';
  dateInput.classList.toggle('invalid', Boolean(errors.incidentDate));

  if (!valid) {
    resultEl.textContent = 'Popraw błędy w formularzu, aby kontynuować.';
    return;
  }

  resultEl.textContent = 'Formularz poprawny — zgłoszenie kradzieży gotowe do wysłania.';
}

function authHeaders() {
  const token = localStorage.getItem('authToken');
  return token ? { Authorization: `Bearer ${token}` } : {};
}

function renderBadge(unreadCount) {
  document.getElementById('notifBadge').textContent = NotificationCounter.formatBadgeValue(unreadCount);
}

async function handleNotificationsError(res) {
  const text = await res.text();
  const body = text ? JSON.parse(text) : null;
  if (res.status === 401) {
    window.location.href = '/login.html';
    return null;
  }
  const err = NotificationCounter.mapErrorResponse(res.status, body);
  document.getElementById('notifCounterResult').textContent = err.text;
  log(`Notifications ${res.status}: ${JSON.stringify(body)}`);
  return err;
}

async function refreshNotificationCounter() {
  const res = await fetch('/api/mobile/v1/notifications/counter', { headers: authHeaders() });
  if (res.status !== 200) { await handleNotificationsError(res); return; }
  const body = await res.json();
  const counter = NotificationCounter.mapCounterResponse(body);
  renderBadge(counter.unreadCount);
  document.getElementById('notifCounterResult').textContent = `Ostatnie odświeżenie: ${counter.calculatedAt}`;
}

async function loadUnreadNotifications() {
  const res = await fetch('/api/mobile/v1/notifications?read=false&limit=50', { headers: authHeaders() });
  if (res.status !== 200) { await handleNotificationsError(res); return; }
  const body = await res.json();
  const list = NotificationCounter.mapListResponse(body);
  const container = document.getElementById('notifList');
  container.innerHTML = '';
  for (const item of list.items) {
    const row = document.createElement('div');
    row.className = 'notif-item';
    row.innerHTML = `
      <span><strong>${item.title}</strong> — ${item.body}</span>
      <button onclick="markNotificationAsRead('${item.id}')">Oznacz jako przeczytane</button>`;
    container.appendChild(row);
  }
}

async function markNotificationAsRead(notificationId) {
  const res = await fetch(`/api/mobile/v1/notifications/${encodeURIComponent(notificationId)}/read`, {
    method: 'PATCH',
    headers: authHeaders(),
  });
  if (res.status !== 200) { await handleNotificationsError(res); return; }
  const body = await res.json();
  const readResult = NotificationCounter.mapReadResponse(body);
  renderBadge(NotificationCounter.applyReadResult(readResult).unreadCount);
  loadUnreadNotifications().catch(() => {});
}

// "Wejście na ekran" — refresh on screen entry per contract.
async function onScreenEnter() {
  await refreshNotificationCounter();
  await loadUnreadNotifications();
}

// Push delivery has no payload the client trusts; per contract it just
// triggers a GET /counter refresh (never bumps the badge locally).
async function onPushReceived() {
  await refreshNotificationCounter();
}

document.getElementById('effectiveDate').valueAsDate = new Date();
document.getElementById('expiryDate').valueAsDate = new Date(Date.now() + 365 * 24 * 3600 * 1000);
loadPolicies().catch(() => {});
onScreenEnter().catch(() => {});
</script>
</body>
</html>
